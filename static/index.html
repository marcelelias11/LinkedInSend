
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Bot Controller</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>LinkedIn Bot Controller</h1>
        
        <div class="form-section">
            <h2>Config Settings</h2>
            <textarea id="configData" placeholder="Enter config data (JSON format)"></textarea>
        </div>

        <div class="form-section">
            <h2>Secrets</h2>
            <textarea id="secretsData" placeholder="Enter secrets data (JSON format)"></textarea>
        </div>

        <div class="form-section">
            <h2>Resume</h2>
            <textarea id="resumeData" placeholder="Enter resume data (JSON format)"></textarea>
        </div>

        <button id="submitBtn" onclick="submitAll()">Submit All & Start Bot</button>
        
        <div id="status" class="status"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
